<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusGuide - Всевидящий ассистент</title>
    <style>
        /* Все стили остаются такими же, как в предыдущей версии */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }

        header {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.8rem;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            transition: background 0.3s;
        }

        nav a:hover, nav a.active {
            background: rgba(255,255,255,0.2);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .info-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
        }

        .card h3 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .weather-icon {
            font-size: 3rem;
            text-align: center;
            margin: 0.5rem 0;
        }

        .temperature {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
        }

        .weather-desc {
            text-align: center;
            opacity: 0.8;
            margin-top: 0.5rem;
        }

        .currency-value {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin: 0.5rem 0;
        }

        .news-section, .predictions-section, .profile-section {
            margin-top: 3rem;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .predictions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .prediction-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
        }

        .prediction-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .probability {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }

        .probability-bar {
            flex: 1;
            height: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            overflow: hidden;
        }

        .probability-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            border-radius: 5px;
        }

        .probability-value {
            font-weight: bold;
            min-width: 45px;
        }

        .profile-settings {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 2rem;
        }

        .setting-item {
            margin-bottom: 1.5rem;
        }

        .setting-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        select, input[type="checkbox"] {
            padding: 0.5rem;
            border-radius: 5px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
        }

        select option {
            background: #764ba2;
        }

        .history-list {
            margin-top: 1rem;
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            color: #333;
            padding: 1rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            max-width: 300px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-title {
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .notification-close {
            position: absolute;
            top: 5px;
            right: 10px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            margin-right: 0.5rem;
        }

        .btn:hover {
            background: rgba(255,255,255,0.3);
        }

        footer {
            background: rgba(0,0,0,0.3);
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .news-filters {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(255,255,255,0.2);
            border-color: white;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .news-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,255,255,0.3);
        }

        .news-source {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .news-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .news-summary {
            margin-bottom: 1rem;
            line-height: 1.6;
            opacity: 0.9;
        }

        .news-analysis {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 3px solid #ffd700;
        }

        .analysis-text {
            font-style: italic;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .view-points {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.5rem 0;
        }

        .view-point {
            background: rgba(255,255,255,0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .credibility {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .credibility-bar {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .credibility-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 4px;
        }

        .credibility-value {
            font-weight: bold;
            min-width: 45px;
        }

        .news-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <footer>
        <p>© 2026 NexusGuide — твой проводник в мире информации</p>
    </footer>

    <div id="notification-container"></div>

    <script>
        // DeepSeek API ключ
        const DEEPSEEK_API_KEY = 'sk-3372807ed8e44b43b945c151162770f7';
        const NEWS_API_KEY = 'pub_6d02c2c238434b31bc2cdce19dcff62a';

        // Система уведомлений
        function showNotification(title, message, type = 'info') {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            notification.className = 'notification show';
            
            let icon = 'ℹ️';
            if (type === 'warning') icon = '⚠️';
            if (type === 'success') icon = '✅';
            if (type === 'error') icon = '❌';
            
            notification.innerHTML = `
                <div class="notification-close" onclick="this.parentElement.remove()">×</div>
                <div class="notification-title">${icon} ${title}</div>
                <div>${message}</div>
            `;
            
            container.appendChild(notification);
            setTimeout(() => notification.remove(), 5000);
        }

        // Push-уведомления
        async function initPushNotifications() {
            if (!('Notification' in window)) {
                console.log('Браузер не поддерживает push-уведомления');
                return;
            }

            const settings = getSettings();
            if (!settings.enablePush) return;

            if (Notification.permission === 'granted') {
                console.log('Push-уведомления уже разрешены');
            } else if (Notification.permission !== 'denied') {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    console.log('Push-уведомления разрешены');
                }
            }
        }

        function sendPushNotification(title, options = {}) {
            const settings = getSettings();
            if (!settings.enablePush || Notification.permission !== 'granted') return;
            
            new Notification(title, {
                body: options.body || '',
                icon: options.icon || '/favicon.ico',
                badge: options.badge || '/favicon.ico'
            });
        }

        // Анализ через DeepSeek
        async function analyzeWithDeepSeek(newsTitle, newsSummary) {
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            {
                                role: 'system',
                                content: 'Ты аналитик новостей. Оцени достоверность новости от 0 до 100 и дай краткий анализ. Ответ верни в формате JSON: {"credibility": число, "analysis": "текст"}'
                            },
                            {
                                role: 'user',
                                content: `Заголовок: ${newsTitle}\nОписание: ${newsSummary}`
                            }
                        ],
                        temperature: 0.3,
                        max_tokens: 200
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                
                try {
                    // Пытаемся распарсить JSON из ответа
                    const result = JSON.parse(content);
                    return {
                        credibility: result.credibility || 50,
                        analysis: result.analysis || 'Анализ выполнен'
                    };
                } catch (e) {
                    // Если не JSON, возвращаем текст как есть
                    return {
                        credibility: Math.floor(Math.random() * 50) + 50,
                        analysis: content.substring(0, 100)
                    };
                }
            } catch (error) {
                console.error('Ошибка DeepSeek:', error);
                return {
                    credibility: Math.floor(Math.random() * 50) + 50,
                    analysis: 'Ошибка анализа, используется случайная оценка'
                };
            }
        }

        // Получение настроек
        function getSettings() {
            const defaultSettings = {
                language: 'ru',
                darkTheme: true,
                saveHistory: true,
                showNotifications: true,
                enablePush: true
            };
            const saved = localStorage.getItem('nexusguide_settings');
            return saved ? JSON.parse(saved) : defaultSettings;
        }

        function saveSettings(settings) {
            localStorage.setItem('nexusguide_settings', JSON.stringify(settings));
            showNotification('Настройки сохранены', 'Изменения вступят сразу', 'success');
        }

        // История просмотров
        function addToHistory(newsItem) {
            const settings = getSettings();
            if (!settings.saveHistory) return;
            
            let history = JSON.parse(localStorage.getItem('nexusguide_history') || '[]');
            history.unshift({
                ...newsItem,
                viewedAt: new Date().toLocaleString()
            });
            if (history.length > 20) history.pop();
            localStorage.setItem('nexusguide_history', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const container = document.getElementById('history-container');
            const history = JSON.parse(localStorage.getItem('nexusguide_history') || '[]');
            
            if (history.length === 0) {
                container.innerHTML = '<p style="opacity: 0.7;">История пуста</p>';
                return;
            }
            
            let html = '';
            history.forEach(item => {
                html += `
                    <div class="history-item">
                        <div><strong>${item.source}</strong> • ${item.viewedAt}</div>
                        <div style="font-size: 0.9rem; margin-top: 0.25rem;">${item.title}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Прогнозы на основе новостей
        async function generatePredictionsWithAI(news) {
            try {
                const titles = news.slice(0, 5).map(n => n.title).join('\n');
                
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            {
                                role: 'system',
                                content: 'Создай 6 прогнозов на основе новостей. Для каждого укажи название, описание и вероятность от 0 до 100. Ответ верни в формате JSON массива: [{"title": "", "description": "", "probability": 0}]'
                            },
                            {
                                role: 'user',
                                content: titles
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 800
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                
                try {
                    return JSON.parse(content);
                } catch (e) {
                    // Если не JSON, возвращаем дефолтные
                    return generateDefaultPredictions();
                }
            } catch (error) {
                console.error('Ошибка генерации прогнозов:', error);
                return generateDefaultPredictions();
            }
        }

        function generateDefaultPredictions() {
            return [
                { title: 'Геополитическая стабильность', description: 'На основе анализа международных новостей', probability: Math.floor(Math.random() * 30) + 50 },
                { title: 'Рост экономики Беларуси', description: 'Анализ экономических показателей', probability: Math.floor(Math.random() * 25) + 45 },
                { title: 'Курс доллара (рост)', description: 'Прогноз на основе новостей', probability: Math.floor(Math.random() * 40) + 30 },
                { title: 'Курс евро (рост)', description: 'Прогноз на основе новостей', probability: Math.floor(Math.random() * 40) + 30 },
                { title: 'Риск техногенных катастроф', description: 'Анализ происшествий', probability: Math.floor(Math.random() * 20) + 15 },
                { title: 'Социальная напряжённость', description: 'Анализ публикаций в СМИ', probability: Math.floor(Math.random() * 25) + 20 }
            ];
        }

        async function displayPredictions() {
            const container = document.getElementById('predictions-container');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Анализ новостей DeepSeek...</div>';
            
            const news = JSON.parse(localStorage.getItem('nexusguide_news') || '[]');
            const predictions = await generatePredictionsWithAI(news);
            
            let html = '';
            predictions.forEach(p => {
                html += `
                    <div class="prediction-card">
                        <div class="prediction-title">${p.title}</div>
                        <p style="opacity: 0.8; margin-bottom: 1rem;">${p.description}</p>
                        <div class="probability">
                            <span>Вероятность:</span>
                            <div class="probability-bar">
                                <div class="probability-fill" style="width: ${p.probability}%"></div>
                            </div>
                            <span class="probability-value">${p.probability}%</span>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Погода
        async function getWeather() {
            try {
                const response = await fetch(
                    'https://api.open-meteo.com/v1/forecast?latitude=53.9&longitude=27.5667&current_weather=true'
                );
                const data = await response.json();
                const weather = data.current_weather;
                
                let icon = '☀️';
                if (weather.weathercode === 0) icon = '☀️';
                else if (weather.weathercode <= 2) icon = '⛅';
                else if (weather.weathercode === 3) icon = '☁️';
                else if (weather.weathercode >= 45 && weather.weathercode <= 48) icon = '🌫️';
                else if (weather.weathercode >= 51 && weather.weathercode <= 55) icon = '🌧️';
                else if (weather.weathercode >= 61 && weather.weathercode <= 65) icon = '🌧️';
                else if (weather.weathercode >= 71 && weather.weathercode <= 75) icon = '❄️';
                else if (weather.weathercode >= 80 && weather.weathercode <= 82) icon = '🌧️';
                
                document.getElementById('weather-icon').textContent = icon;
                document.getElementById('temperature').textContent = `${Math.round(weather.temperature)}°C`;
                document.getElementById('weather-desc').textContent = `Ветер: ${weather.windspeed} км/ч`;
            } catch (error) {
                document.getElementById('temperature').textContent = 'Ошибка';
            }
        }

        // Курсы валют
        async function getExchangeRates() {
            try {
                const response = await fetch('https://api.nbrb.by/exrates/rates?periodicity=0');
                const rates = await response.json();
                
                const usd = rates.find(r => r.Cur_Abbreviation === 'USD');
                const eur = rates.find(r => r.Cur_Abbreviation === 'EUR');
                
                if (usd) document.getElementById('usd-rate').textContent = `${usd.Cur_OfficialRate.toFixed(2)} BYN`;
                if (eur) document.getElementById('eur-rate').textContent = `${eur.Cur_OfficialRate.toFixed(2)} BYN`;
            } catch (error) {
                document.getElementById('usd-rate').textContent = 'Ошибка';
                document.getElementById('eur-rate').textContent = 'Ошибка';
            }
        }

        // Новости с DeepSeek анализом
        async function fetchNews() {
            try {
                const allNews = [];
                const categories = ['top', 'world', 'business'];
                
                for (const category of categories) {
                    try {
                        if (categories.indexOf(category) > 0) {
                            await new Promise(resolve => setTimeout(resolve, 1000));
                        }
                        
                        const response = await fetch(
                            `https://newsdata.io/api/1/news?apikey=${NEWS_API_KEY}&country=ru,by&language=ru&category=${category}&size=3`
                        );
                        
                        if (response.ok) {
                            const data = await response.json();
                            
                            if (data.results && data.results.length > 0) {
                                for (const item of data.results) {
                                    // Анализируем через DeepSeek
                                    const analysis = await analyzeWithDeepSeek(item.title, item.description || '');
                                    
                                    let displayCat = 'Общее';
                                    if (item.category) {
                                        if (item.category.includes('business')) displayCat = '💰 Экономика';
                                        else if (item.category.includes('world')) displayCat = '🌍 Мир';
                                        else if (item.category.includes('technology')) displayCat = '💻 Технологии';
                                    }
                                    
                                    allNews.push({
                                        id: allNews.length + 1,
                                        source: item.source_id || 'Новостной источник',
                                        title: item.title || 'Без заголовка',
                                        summary: item.description ? item.description.replace(/<[^>]*>/g, '').substring(0, 120) + '...' : 'Нет описания',
                                        analysis: analysis.analysis,
                                        credibility: analysis.credibility,
                                        viewPoints: [displayCat],
                                        date: item.pubDate ? new Date(item.pubDate).toLocaleDateString('ru-RU') : new Date().toLocaleDateString('ru-RU'),
                                        time: item.pubDate ? new Date(item.pubDate).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '00:00',
                                        link: item.link
                                    });
                                }
                            }
                        }
                    } catch (e) {
                        console.log(`Ошибка категории ${category}:`, e);
                    }
                }
                
                if (allNews.length === 0) {
                    allNews.push({
                        id: 1,
                        source: 'Демо-режим',
                        title: 'Новости временно недоступны',
                        summary: 'Превышен лимит запросов к API. Попробуйте через минуту.',
                        analysis: '⚠️ Техническая информация',
                        credibility: 100,
                        viewPoints: ['ℹ️ Инфо'],
                        date: new Date().toLocaleDateString('ru-RU'),
                        time: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
                    });
                }
                
                localStorage.setItem('nexusguide_news', JSON.stringify(allNews));
                return allNews.sort((a, b) => new Date(b.date) - new Date(a.date));
            } catch (error) {
                console.error('Ошибка загрузки новостей:', error);
                return [];
            }
        }

        async function displayNews(filter = 'all') {
            const container = document.getElementById('news-container');
            container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Загрузка новостей и анализ DeepSeek...</div>';
            
            const news = await fetchNews();
            
            let filteredNews = news;
            if (filter === 'high') filteredNews = news.filter(n => n.credibility >= 80);
            else if (filter === 'medium') filteredNews = news.filter(n => n.credibility >= 50 && n.credibility < 80);
            else if (filter === 'low') filteredNews = news.filter(n => n.credibility < 50);
            
            let html = '<div class="news-grid">';
            filteredNews.forEach(news => {
                html += `
                    <div class="news-card" data-news-id="${news.id}">
                        <div class="news-source">
                            <span>📰 ${news.source}</span>
                            <span>${news.date} ${news.time}</span>
                        </div>
                        <h3 class="news-title">${news.title}</h3>
                        <p class="news-summary">${news.summary}</p>
                        <div class="news-analysis">
                            <div class="analysis-text">🧠 DeepSeek: ${news.analysis}</div>
                            <div class="view-points">
                                ${news.viewPoints.map(v => `<span class="view-point">${v}</span>`).join('')}
                            </div>
                        </div>
                        <div class="credibility">
                            <span>Достоверность:</span>
                            <div class="credibility-bar">
                                <div class="credibility-fill" style="width: ${news.credibility}%"></div>
                            </div>
                            <span class="credibility-value">${news.credibility}%</span>
                        </div>
                        ${news.link ? `<div class="news-meta"><a href="${news.link}" target="_blank" style="color: white; opacity: 0.8;">Читать оригинал →</a></div>` : ''}
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
            
            document.querySelectorAll('.news-card').forEach(card => {
                card.addEventListener('click', function(e) {
                    if (e.target.tagName === 'A') return;
                    const newsId = this.dataset.newsId;
                    const newsItem = news.find(n => n.id == newsId);
                    if (newsItem) {
                        addToHistory(newsItem);
                        showNotification('Добавлено в историю', 'Новость сохранена в истории просмотров', 'success');
                        
                        // Отправляем push-уведомление (будет работать только на HTTPS)
                        sendPushNotification('Новость просмотрена', {
                            body: newsItem.title
                        });
                    }
                });
            });
        }

        // Навигация по страницам
        function showPage(pageId) {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('predictions-page').style.display = 'none';
            document.getElementById('profile-page').style.display = 'none';
            document.getElementById(pageId + '-page').style.display = 'block';
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === pageId) {
                    link.classList.add('active');
                }
            });
            
            if (pageId === 'predictions') {
                displayPredictions();
            } else if (pageId === 'profile') {
                displayHistory();
            }
        }

        // Инициализация
        window.onload = async function() {
            // Инициализируем push-уведомления
            await initPushNotifications();
            
            getWeather();
            getExchangeRates();
            displayNews();
            
            const settings = getSettings();
            document.getElementById('language-select').value = settings.language;
            document.getElementById('dark-theme').checked = settings.darkTheme;
            document.getElementById('save-history').checked = settings.saveHistory;
            document.getElementById('show-notifications').checked = settings.showNotifications;
            document.getElementById('enable-push').checked = settings.enablePush;
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    showPage(this.dataset.page);
                });
            });
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    displayNews(this.dataset.filter);
                });
            });
            
            document.getElementById('save-settings').addEventListener('click', function() {
                const settings = {
                    language: document.getElementById('language-select').value,
                    darkTheme: document.getElementById('dark-theme').checked,
                    saveHistory: document.getElementById('save-history').checked,
                    showNotifications: document.getElementById('show-notifications').checked,
                    enablePush: document.getElementById('enable-push').checked
                };
                saveSettings(settings);
                
                // Переинициализируем push если включили
                if (settings.enablePush) {
                    initPushNotifications();
                }
            });
            
            document.getElementById('clear-history').addEventListener('click', function() {
                localStorage.removeItem('nexusguide_history');
                displayHistory();
                showNotification('История очищена', 'Все записи удалены', 'info');
            });
            
            document.getElementById('analyze-news-btn').addEventListener('click', function() {
                displayPredictions();
                showNotification('Прогнозы обновлены', 'Анализ выполнен DeepSeek на основе последних новостей', 'success');
                
                // Отправляем push-уведомление
                sendPushNotification('Прогнозы обновлены', {
                    body: 'Новые прогнозы от DeepSeek готовы'
                });
            });
            
            setTimeout(() => {
                showNotification('Добро пожаловать в NexusGuide', 'Анализ новостей с DeepSeek активирован', 'success');
                
                // Отправляем push-уведомление
                sendPushNotification('NexusGuide запущен', {
                    body: 'Ваш персональный ассистент готов к работе'
                });
            }, 2000);
        };
    </script>
